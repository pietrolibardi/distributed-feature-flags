server:
  port: 8082

spring:
  application:
    name: flag-service
  datasource:
    url: jdbc:postgresql://localhost:5433/flag_db
    username: postgres
    password: postgres
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:3600000}

evaluation-service-url: ${EVALUATION_SERVICE_URL:http://localhost:8083}
